---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - deployment.yaml
  - service.yaml

commonLabels:
  app: frontend
  managed-by: argocd

configMapGenerator:
  - name: frontend-config
    literals:
      - APP_NAME=frontend
      - THEME=dark

images:
  - name: nginx
    newTag: 1.25-alpine
